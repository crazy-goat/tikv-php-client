syntax = "proto3";
package kvrpcpb;

// RegionEpoch for version tracking
message RegionEpoch {
  uint64 conf_ver = 1;
  uint64 version = 2;
}

// Minimal Peer for Context
message Peer {
  uint64 id = 1;
  uint64 store_id = 2;
}

// Minimal Context for RawKV
message Context {
  uint64 region_id = 1;
  RegionEpoch region_epoch = 2;
  Peer peer = 3;
  uint64 term = 5;
}

// RawKV Get
message RawGetRequest {
  Context context = 1;
  bytes key = 2;
}

message RawGetResponse {
  bytes value = 3;  // Field 3 to match TiKV proto
  bool not_found = 4;
}

// RawKV Put  
message RawPutRequest {
  Context context = 1;
  bytes key = 2;
  bytes value = 3;
}

message RawPutResponse {
}

// RawKV Delete
message RawDeleteRequest {
  Context context = 1;
  bytes key = 2;
}

message RawDeleteResponse {
}
