syntax = "proto3";
package pdpb;

// RequestHeader is required by PD
message RequestHeader {
  uint64 cluster_id = 1;
  uint64 sender_id = 2;
}

// ResponseHeader is returned by PD
message ResponseHeader {
  uint64 cluster_id = 1;
  Error error = 2;
}

message Error {
  string message = 1;
}

// RegionEpoch for version tracking
message RegionEpoch {
  uint64 conf_ver = 1;
  uint64 version = 2;
}

// Minimal Region from metapb
message Region {
  uint64 id = 1;
  bytes start_key = 2;
  bytes end_key = 3;
  RegionEpoch region_epoch = 4;
  repeated Peer peers = 5;
}

message Peer {
  uint64 id = 1;
  uint64 store_id = 2;
}

message GetRegionRequest {
  RequestHeader header = 1;
  bytes key = 2;
}

message GetRegionResponse {
  ResponseHeader header = 1;
  Region region = 2;
  Peer leader = 3;
}

service PD {
  rpc GetRegion(GetRegionRequest) returns (GetRegionResponse);
}
